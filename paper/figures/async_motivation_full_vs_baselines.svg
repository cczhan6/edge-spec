<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="700" viewBox="0 0 1320 700">
  <defs>
    <style>
      .panel-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .panel-note { font: 400 12px Arial, Helvetica, sans-serif; fill: #64748b; }
      .row-label { font: 700 12px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 400 10.5px Arial, Helvetica, sans-serif; fill: #64748b; }
      .block-text { font: 700 11px Arial, Helvetica, sans-serif; fill: #334155; }
      .white-text { font: 700 11px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .callout-text { font: 700 12px Arial, Helvetica, sans-serif; fill: #334155; }
      .panel { fill: #fbfdff; stroke: #d7e1ea; stroke-width: 1.2; }
      .panel-ours { fill: #f3fbf5; stroke: #36b36a; stroke-width: 1.5; }
      .row-line { stroke: #e2e8f0; stroke-width: 1; }
      .lane-band { fill: #f1f8fc; stroke: #c8dde9; stroke-width: 1; }
      .slot { stroke: #94a3b8; stroke-opacity: 0.38; stroke-width: 1; stroke-dasharray: 4 6; }
      .connector { stroke: #94a3b8; stroke-opacity: 0.34; stroke-width: 1; stroke-dasharray: 2 6; fill: none; }
      .verify { fill: #c9edc3; fill-opacity: 0.72; stroke: #63b46c; stroke-width: 1; }
      .proactive { fill: #fde9a9; fill-opacity: 0.72; stroke: #d59b2d; stroke-width: 1; }
      .draft { fill: #f8ccb4; fill-opacity: 0.72; stroke: #df895d; stroke-width: 1; }
      .decode { fill: #7fc3eb; fill-opacity: 0.78; stroke: #2f80bd; stroke-width: 1; }
      .server { fill: #d9ecf5; fill-opacity: 0.78; stroke: #84aec5; stroke-width: 1; }
      .uplink { fill: #cbd5dd; fill-opacity: 0.76; stroke: #8fa0ac; stroke-width: 1; }
      .downlink { fill: #cfe7d5; fill-opacity: 0.76; stroke: #7ead8a; stroke-width: 1; }
      .wait { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 5 5; }
      .commit { fill: #4d9bda; fill-opacity: 0.82; stroke: #2268a6; stroke-width: 1; }
      .warnbox { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.1; }
      .goodbox { fill: #f0fdf4; stroke: #22a65a; stroke-width: 1.1; }
