simulation:
  seed: 42
  num_requests: 480
  num_devices: 8
  output_len_choices: [64, 128, 256]
  request_arrival: burst
  poisson_rate_per_s: 20

dynamic_edge_compute:
  enabled: false
  resample_every_completed_requests: 5

experiment:
  contract_version: 1
  canonical_methods: ["target_only", "server_only_linear", "server_only_tree", "specedge_linear", "specedge_tree", "dip_sd"]
  formal_online_scenarios: ["homogeneous", "combined_strong_heterogeneous"]
  internal_time_unit: ms
  csv_time_unit: ms
  use_fake_model_runner: false
  request_device_assignment: fixed
  model_residency_policy: all_configured_models_simultaneous

edge:
  num_lanes: 4
  lane_microbatch: false
  verify_startup_ms: 8
  target_only_startup_ms: 0
  target_only_token_rate_tok_s: 80

target_latency:
  mode: analytical
  profile_path: outputs/profiling/target_verification_latency_full_merged.csv
  metric: p50_ms

model_runner:
  target_model: Qwen/Qwen2.5-7B-Instruct
  target_device: "cuda:1"
  drafter_models:
    small:
      model: Qwen/Qwen2.5-0.5B-Instruct
      device: "cuda:0"
    medium:
      model: Qwen/Qwen2.5-1.5B-Instruct
      device: "cuda:0"
    large:
      model: Qwen/Qwen2.5-3B-Instruct
      device: "cuda:0"

model_bindings:
  vocabulary_compatibility: exact_token_id_mapping
  target:
    model: Qwen/Qwen2.5-7B-Instruct
    revision: a09a35458c702b33eeacc393d103063234e8bc28
    tokenizer_revision: a09a35458c702b33eeacc393d103063234e8bc28
    device: "cuda:1"
  drafters:
    small:
      model: Qwen/Qwen2.5-0.5B-Instruct
      revision: 7ae557604adf67be50417f59c2c2f167def9a775
      tokenizer_revision: 7ae557604adf67be50417f59c2c2f167def9a775
      device: "cuda:0"
    medium:
      model: Qwen/Qwen2.5-1.5B-Instruct
      revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
      tokenizer_revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
      device: "cuda:0"
    large:
      model: Qwen/Qwen2.5-3B-Instruct
      revision: aa8e72537993ba99e69dfaafa59ed015b17504d1
      tokenizer_revision: aa8e72537993ba99e69dfaafa59ed015b17504d1
      device: "cuda:0"

drafter_profiles:
  small:
    acceptance_prior: 0.45
  medium:
    acceptance_prior: 0.65
  large:
    acceptance_prior: 0.82

device_pools:
  heterogeneous:
    templates:
      low_end:
        count: 3
        drafter_profile: small
        draft_token_rate_tok_s: 25
        dynamic_draft_token_rate_range_tok_s: [20, 30]
        draft_startup_ms: 1
        uplink_mbps: 5
        downlink_mbps: 30
        rtt_ms: 90
        jitter_ms: 25
      mid_end:
        count: 3
        drafter_profile: medium
        draft_token_rate_tok_s: 60
        dynamic_draft_token_rate_range_tok_s: [48, 72]
        draft_startup_ms: 2
        uplink_mbps: 25
        downlink_mbps: 100
        rtt_ms: 40
        jitter_ms: 10
      high_end:
        count: 2
        drafter_profile: large
        draft_token_rate_tok_s: 100
        dynamic_draft_token_rate_range_tok_s: [80, 120]
        draft_startup_ms: 3
        uplink_mbps: 100
        downlink_mbps: 300
        rtt_ms: 10
        jitter_ms: 2
  medium_only:
    templates:
      medium:
        count: 8
        drafter_profile: medium
        draft_token_rate_tok_s: 60
        dynamic_draft_token_rate_range_tok_s: [48, 72]
        draft_startup_ms: 2
        uplink_mbps: 25
        downlink_mbps: 100
        rtt_ms: 40
        jitter_ms: 10

speculation:
  W_default: 2
  W_max: 4
  unconfirmed_token_budget: 16
  gamma_candidates: [1, 2, 4, 6, 8]
  gamma_fixed: 4
  acceptance_window_rounds: 8

network:
  packet_token_bytes: 4
  packet_header_bytes: 128

sync_batch:
  B_global: 8
  global_batch_timeout_ms: 20

server_only:
  # Project main experiments fix the official server-only
  # client.max_batch_size equivalent at 1. Values greater than 1 are an
  # optional extension and are rejected by the current single-request
  # server-only runtime.
  batch_size: 1
  drafter_profile: medium
  tree_draft_strategy: specexec_approx
  max_n_beams: 32
  max_beam_len: 4
  max_branch_width: 16
  max_budget: 64
  draft_startup_ms: 2
  # RTX 4090 Ollama benchmark for qwen2.5:1.5b: mean eval rate
  # across five prompts is ~503.9 tok/s, rounded to 504.
  draft_token_rate_tok_s: 504

specedge:
  # Default experiments use the SpecExec-style tree baseline. Override with
  # TREE_DRAFT_STRATEGY=linear for the linear approximation.
  tree_draft_strategy: specexec_approx
  max_n_beams: 32
  max_beam_len: 4
  max_branch_width: 16
  max_budget: 32
  pipeline_aware_scheduling: true
  proactive_enabled: true
  proactive_type: excluded
  proactive_tree_draft_strategy: specexec_approx
  proactive_max_beam_len: 3
  proactive_max_budget: 32
  server_batch_type: static
  server_batch_size: 1
  server_batch_timeout_ms: null

dip_sd:
  adaptation: online_epoch_barrier
  optimizer: paper_exact
  batch_count: 2
  draft_length: 2
  max_active_requests: 8
  max_batch_size: 4
  min_draft_length: 1
  max_draft_length: 4
  acceptance_estimator: configured_profile
